site_name: 文档站点
site_description: 由 Markdown 自动构建的静态站点
site_url: https://fmpty.github.io/gitweb/

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 指南: guide.md
  - 示例: example.md
  - 示例合集:
      - 概述: examples/index.md
      - 表格与列表: examples/tables.md
      - 代码与命令: examples/code.md
      - 提示与折叠: examples/admonitions.md

plugins:
  - search
